      - API Documentation
    humanURL: https://github.com/slatedocs/slate
    properties:
      - url: https://github.com/slatedocs/slate
        type: GitHub
      - url: https://slatedocs.github.io/slate/
        type: LiveDemo
      - url: https://hub.docker.com/r/slatedocs/slate
        type: Docker
      - url: json-schema/slate-frontmatter-schema.json
        type: JSONSchema
      - url: json-ld/slate-context.jsonld
        type: JSON-LD
    description: >-
      Slate is an open-source static site generator for creating beautiful,
      three-panel API documentation from Markdown files. Originally created by
      Robert Lord in 2013 at TripIt and later maintained by the slatedocs
      organization, Slate is built on Ruby and the Middleman static site
      framework. It renders documentation with a navigation sidebar on the
      left, API descriptions in the center panel, and code samples in the
      right panel. Documentation is written in Markdown with YAML frontmatter
      controlling page configuration, language tabs, included files, search,
      and meta tags. Slate has been used by organizations including NASA, Sony,
      Best Buy, Travis CI, Greenhouse, WooCommerce, Dwolla, Clearbit, and
      Coinbase. It supports over 100 syntax-highlighted languages via Rouge,
      multi-language code sample tabs, automatic table of contents generation,
      RTL language support, and deployment to GitHub Pages. Slate is available
      as a native Ruby installation, via Vagrant, and as a Docker image.
